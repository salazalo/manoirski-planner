<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Manoirski — Spring + Summer '26</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,600;1,6..72,300;1,6..72,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; overflow: hidden; }
  body { background: #faf7f4; color: #3a2e24; font-family: 'Newsreader', Georgia, serif; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

  @keyframes popIn { from { opacity:0; transform: translate(-50%,4px) scale(0.95); } to { opacity:1; transform: translate(-50%,8px) scale(1); } }
  @keyframes fadeUp { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
  @keyframes tapPop { 0%{transform:scale(1);} 50%{transform:scale(0.88);} 100%{transform:scale(1);} }

  :root {
    --green: #228b68; --green-soft: rgba(34,139,104,0.08);
    --red: #d4564e; --red-soft: #fde8e7; --red-border: #d4564e80;
    --text: #3a2e24; --muted: #8a7e74; --faint: #b0a89e;
    --bg: #faf7f4; --card: #fff; --line: #ece6df;
    --mono: 'JetBrains Mono', monospace; --serif: 'Newsreader', Georgia, serif;
    --bottom-bar: 64px;
    --cell: max(40px, calc((100vw - 48px - 18px) / 7));
  }

  .cell {
    width: var(--cell); height: var(--cell); border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; cursor: pointer; user-select: none;
    font-family: var(--mono); position: relative;
    border: 2px solid transparent; font-weight: 400;
    transition: border-color 0.15s, background 0.15s;
  }
  .cell-tap { animation: tapPop 0.2s ease; }

  .wk {
    padding: 8px 14px; border-radius: 9px; font-size: 12px; font-family: var(--mono);
    border: 1.5px solid var(--line); background: var(--card); color: var(--muted);
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
    display: flex; align-items: center; gap: 5px;
  }
  .wk:active { transform: scale(0.96); }
  .wk-on { border-color: var(--green); color: var(--green); background: var(--green-soft); font-weight: 600; }
  .wk-blk { border-color: var(--red-border); color: var(--red); background: var(--red-soft); font-weight: 600; }

  .dest {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 14px; border-radius: 11px;
    border: 1.5px solid var(--line); background: var(--card);
    cursor: pointer; transition: all 0.2s;
  }
  .dest:active { transform: scale(0.97); }
  .dest-on { border-color: var(--red); background: #fff5f4; }

  .person {
    padding: 8px 16px; border-radius: 100px; font-size: 13px;
    font-family: var(--mono); border: 1.5px solid var(--line);
    cursor: pointer; transition: all 0.2s; background: var(--card); color: var(--muted);
  }
  .person:active { transform: scale(0.95); }
  .person-on { border-color: var(--text); background: var(--text); color: var(--bg); font-weight: 700; }

  .mnav {
    flex: 1; padding: 8px 4px; border-radius: 8px; font-size: 12px;
    font-family: var(--mono); border: none; cursor: pointer;
    transition: all 0.15s; background: transparent; color: var(--faint);
    font-weight: 400; text-align: center;
  }
  .mnav-on { background: var(--text); color: var(--bg); font-weight: 700; }

  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: var(--bottom-bar); background: var(--bg);
    border-top: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 0 16px; z-index: 80;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.04);
  }

  .mode-pill {
    flex: 1; max-width: 160px; padding: 10px 0; border-radius: 12px;
    font-size: 13px; font-family: var(--mono); font-weight: 600;
    border: none; cursor: pointer; transition: all 0.2s;
    text-align: center; letter-spacing: 0.3px;
  }
  .mode-pill:active { transform: scale(0.96); }

  .toast {
    position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: var(--bg); padding: 8px 16px;
    border-radius: 100px; font-size: 12px; font-family: var(--mono);
    z-index: 90; animation: fadeUp 0.3s ease; pointer-events: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }

  .tooltip {
    position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
    background: var(--text); color: var(--bg); border-radius: 8px;
    padding: 6px 10px; font-size: 11px; font-family: var(--mono);
    white-space: nowrap; z-index: 50; pointer-events: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .tooltip::after {
    content: ''; position: absolute; top: 100%; left: 50%;
    border: 5px solid transparent; border-top-color: var(--text);
    transform: translateX(-50%);
  }

  .sync-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #ddd5cc; border-radius: 2px; }

  @media (max-width: 480px) {
    .cell { font-size: 13px; border-radius: 8px; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useRef, useEffect } = React;

// ─── Config ──────────────────────────────────────────────────────────────────
const JSONBIN_KEY = "$2a$10$MG5EVbOjMOOOpQ.U/eNXVO5rR.o69QTk8RpzAS0t/smHTYsGy5Lri";
const BIN_NAME = "manoirski-planner-v1";
let BIN_ID = null;

const YEAR = 2026;
const MONTHS = [
  { name: "April", short: "Apr", days: 30, start: 2 },
  { name: "May", short: "May", days: 31, start: 4 },
  { name: "June", short: "Jun", days: 30, start: 0 },
  { name: "July", short: "Jul", days: 31, start: 2 },
  { name: "August", short: "Aug", days: 31, start: 5 },
];

const TERMS = [
  { label: "P2", bg: "#fff0f0", accent: "#d4736c", dot: "#c0564e", start:[0,1], end:[0,28] },
  { label: "Break", bg: "#fff8e6", accent: "#c9a84c", dot: "#b8923a", start:[0,29], end:[1,3] },
  { label: "P3", bg: "#eef2ff", accent: "#7088d4", dot: "#5a72be", start:[1,4], end:[2,19] },
  { label: "Summer", bg: "#edfaf5", accent: "#5ab89a", dot: "#48a688", start:[2,20], end:[4,23] },
];
const termFor = (mi,d) => { const v=mi*100+d; for(const t of TERMS){if(v>=t.start[0]*100+t.start[1]&&v<=t.end[0]*100+t.end[1])return t;} return null; };

const DESTINATIONS = [
  { name: "San Sebastián", flag: "🇪🇸", cat: "wknd" },
  { name: "Lisbon", flag: "🇵🇹", cat: "wknd" },
  { name: "Madrid", flag: "🇪🇸", cat: "wknd" },
  { name: "Amsterdam", flag: "🇳🇱", cat: "wknd" },
  { name: "Copenhagen", flag: "🇩🇰", cat: "wknd" },
  { name: "Slovenia", flag: "🇸🇮", cat: "wknd" },
  { name: "Mallorca", flag: "🏝️", cat: "long" },
  { name: "Algarve", flag: "🇵🇹", cat: "long" },
  { name: "Switzerland", flag: "🇨🇭", cat: "long" },
  { name: "Albania / Montenegro", flag: "🏔️", cat: "long" },
  { name: "Norway", flag: "🇳🇴", cat: "long" },
  { name: "Sicily", flag: "🇮🇹", cat: "long" },
  { name: "Dolomites", flag: "⛰️", cat: "long" },
];

const FRIENDS = ["Amanda", "Gonzalo", "Guilherme", "Matheus", "Pippa"];
const DOW = ["Mo","Tu","We","Th","Fr","Sa","Su"];
const K = (mi,d) => `${mi}-${d}`;

const HEAT = ["transparent","rgba(34,139,104,0.12)","rgba(34,139,104,0.24)","rgba(34,139,104,0.38)","rgba(34,139,104,0.55)","rgba(34,139,104,0.78)"];

const getWeekends = (mi) => {
  const m=MONTHS[mi], ws=[];
  for(let d=1;d<=m.days;d++){if((m.start+d-1)%7===4){const days=[d];if(d+1<=m.days)days.push(d+1);if(d+2<=m.days)days.push(d+2);ws.push(days);}}
  return ws;
};

// ─── JSONBin ─────────────────────────────────────────────────────────────────
const hdrs = {"X-Master-Key":JSONBIN_KEY,"Content-Type":"application/json"};

async function findOrCreateBin() {
  try {
    const r = await fetch("https://api.jsonbin.io/v3/c/uncategorized/bins",{headers:{"X-Master-Key":JSONBIN_KEY}});
    if(r.ok){const d=await r.json();const e=d.find(b=>b.snippetMeta?.name===BIN_NAME);if(e){BIN_ID=e.record;return BIN_ID;}}
  } catch(e){}
  const empty={avail:{},blocks:{},votes:{}};
  FRIENDS.forEach(f=>{empty.avail[f]=[];empty.blocks[f]={};empty.votes[f]=[];});
  const r=await fetch("https://api.jsonbin.io/v3/b",{method:"POST",headers:{...hdrs,"X-Bin-Name":BIN_NAME,"X-Bin-Private":"false"},body:JSON.stringify(empty)});
  const d=await r.json(); BIN_ID=d.metadata.id; return BIN_ID;
}

async function loadData() {
  if(!BIN_ID) await findOrCreateBin();
  const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{headers:{"X-Master-Key":JSONBIN_KEY,"X-Bin-Meta":"false"}});
  return r.json();
}

async function saveData(data) {
  if(!BIN_ID) return;
  await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{method:"PUT",headers:hdrs,body:JSON.stringify(data)});
}

function serialize(a,b,v) {
  const o={avail:{},blocks:{},votes:{}};
  FRIENDS.forEach(f=>{o.avail[f]=a[f]?[...a[f]]:[];o.blocks[f]=b[f]||{};o.votes[f]=v[f]?[...v[f]]:[];});
  return o;
}
function deserialize(d) {
  const a={},b={},v={};
  FRIENDS.forEach(f=>{a[f]=new Set(d.avail?.[f]||[]);b[f]=d.blocks?.[f]||{};v[f]=new Set(d.votes?.[f]||[]);});
  return {avail:a,blocks:b,votes:v};
}


// ─── Inline reason ───────────────────────────────────────────────────────────
function InlineReason({position, onDone}) {
  const [val,setVal] = useState("");
  const ref = useRef(null);
  useEffect(()=>{ref.current?.focus();},[]);
  return (
    <div style={{position:"fixed",inset:0,zIndex:999,background:"rgba(0,0,0,0.15)"}} onClick={()=>onDone(val)}>
      <div style={{position:"absolute",top:position.y,left:Math.min(Math.max(position.x,120),window.innerWidth-120),
        transform:"translate(-50%,8px)",animation:"popIn 0.15s ease"}} onClick={e=>e.stopPropagation()}>
        <div style={{background:"#fff",borderRadius:12,padding:"10px 12px",
          boxShadow:"0 12px 40px rgba(0,0,0,0.18)",border:"1.5px solid #e8e0d8",
          display:"flex",gap:8,alignItems:"center"}}>
          <input ref={ref} type="text" maxLength={40} placeholder="Reason? (optional)"
            value={val} onChange={e=>setVal(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter")onDone(val);if(e.key==="Escape")onDone(null);}}
            style={{border:"none",outline:"none",fontSize:14,width:170,padding:"6px 2px",
              fontFamily:"var(--serif)",color:"#3a2e24",background:"transparent"}}
          />
          <button onClick={()=>onDone(val)} style={{border:"none",background:"#d4564e",color:"#fff",
            borderRadius:8,padding:"6px 14px",fontSize:12,cursor:"pointer",
            fontFamily:"var(--mono)",fontWeight:700}}>Block</button>
        </div>
      </div>
    </div>
  );
}


// ─── App ─────────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(()=>localStorage.getItem("manoirski-user")||"");
  const [avail, setAvail] = useState(()=>{const a={};FRIENDS.forEach(f=>a[f]=new Set());return a;});
  const [blocks, setBlocks] = useState(()=>{const b={};FRIENDS.forEach(f=>b[f]={});return b;});
  const [votes, setVotes] = useState(()=>{const v={};FRIENDS.forEach(f=>v[f]=new Set());return v;});
  const [mode, setMode] = useState("free"); // "free" | "blocked"
  const [activeMonth, setActiveMonth] = useState(()=>{
    // Default to current-ish month
    const now = new Date(); const m = now.getMonth();
    if(m>=3&&m<=7) return m-3; return 0;
  });
  const [dragging, setDragging] = useState(false);
  const [reasonInput, setReasonInput] = useState(null);
  const [hovered, setHovered] = useState(null);
  const [toast, setToast] = useState(null);
  const [syncStatus, setSyncStatus] = useState("loading");
  const [tapped, setTapped] = useState(null); // key for tap animation

  const saveTimeout = useRef(null);
  const dataRef = useRef({avail,blocks,votes});
  useEffect(()=>{dataRef.current={avail,blocks,votes};},[avail,blocks,votes]);
  useEffect(()=>{if(user)localStorage.setItem("manoirski-user",user);},[user]);

  // Toast helper
  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(null), 2200); };

  // Load & poll
  useEffect(()=>{
    loadData().then(d=>{
      const r=deserialize(d); setAvail(r.avail); setBlocks(r.blocks); setVotes(r.votes);
      setSyncStatus("synced");
    }).catch(()=>setSyncStatus("error"));

    const iv = setInterval(()=>{
      loadData().then(d=>{
        const r=deserialize(d); setAvail(r.avail); setBlocks(r.blocks); setVotes(r.votes);
        setSyncStatus("synced");
      }).catch(()=>{});
    }, 12000);
    return ()=>clearInterval(iv);
  },[]);

  const scheduleSave = useCallback(()=>{
    if(saveTimeout.current) clearTimeout(saveTimeout.current);
    setSyncStatus("saving");
    saveTimeout.current = setTimeout(()=>{
      const {avail:a,blocks:b,votes:v}=dataRef.current;
      saveData(serialize(a,b,v)).then(()=>setSyncStatus("synced")).catch(()=>setSyncStatus("error"));
    }, 700);
  },[]);

  // ─── Actions ───────────────────────────────────────────────────────────
  const markAvail = useCallback((k_,add)=>{
    setAvail(p=>{const n={...p};const s=new Set(n[user]);add?s.add(k_):s.delete(k_);n[user]=s;return n;});
    if(add) setBlocks(p=>{const n={...p};const u={...n[user]};delete u[k_];n[user]=u;return n;});
    scheduleSave();
  },[user,scheduleSave]);

  const markBlock = useCallback((k_,reason)=>{
    setBlocks(p=>{const n={...p};const u={...n[user]};u[k_]=reason||"";n[user]=u;return n;});
    setAvail(p=>{const n={...p};const s=new Set(n[user]);s.delete(k_);n[user]=s;return n;});
    scheduleSave();
  },[user,scheduleSave]);

  const unblock = useCallback((k_)=>{
    setBlocks(p=>{const n={...p};const u={...n[user]};delete u[k_];n[user]=u;return n;});
    scheduleSave();
  },[user,scheduleSave]);

  const toggleWknd = useCallback((mi,days)=>{
    const keys=days.map(d=>K(mi,d));
    if(mode==="blocked") {
      const allBlk = keys.every(k_=>k_ in (blocks[user]||{}));
      if(allBlk) { keys.forEach(k_=>unblock(k_)); }
      else { setReasonInput({keys, x:window.innerWidth/2, y:window.innerHeight/2 - 60}); }
    } else {
      setAvail(p=>{const n={...p};const s=new Set(n[user]);const allOn=keys.every(k_=>s.has(k_));
        keys.forEach(k_=>allOn?s.delete(k_):s.add(k_));n[user]=s;return n;});
      setBlocks(p=>{const n={...p};const u={...n[user]};days.forEach(d=>delete u[K(mi,d)]);n[user]=u;return n;});
      scheduleSave();
    }
  },[user,mode,blocks,scheduleSave,unblock]);

  const toggleVote = useCallback((d)=>{
    setVotes(p=>{const n={...p};const s=new Set(n[user]);s.has(d)?s.delete(d):s.add(d);n[user]=s;return n;});
    scheduleSave();
  },[user,scheduleSave]);

  const countFree = (k_)=>FRIENDS.filter(f=>avail[f]?.has(k_)).length;
  const countBlocked = (k_)=>FRIENDS.filter(f=>k_ in (blocks[f]||{})).length;
  const isMyAvail = (k_)=>avail[user]?.has(k_);
  const isMyBlock = (k_)=>k_ in (blocks[user]||{});
  const vc = (d)=>FRIENDS.filter(f=>votes[f]?.has(d)).length;

  // Cell interaction — unified for mouse & touch
  const handleCellAction = (mi, d, evt) => {
    const k_ = K(mi,d);
    // Tap animation
    setTapped(k_); setTimeout(()=>setTapped(null), 200);

    if(mode==="blocked") {
      if(isMyBlock(k_)) { unblock(k_); }
      else {
        const rect = evt?.target?.getBoundingClientRect?.();
        const x = rect ? rect.left+rect.width/2 : window.innerWidth/2;
        const y = rect ? rect.bottom : window.innerHeight/2;
        setReasonInput({keys:[k_], x, y});
      }
    } else {
      if(isMyBlock(k_)) { unblock(k_); markAvail(k_,true); }
      else { markAvail(k_, !isMyAvail(k_)); }
    }
  };

  // Touch drag
  const touchRef = useRef({active:false, mode:null});
  const getCellFromTouch = (touch) => {
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    return el?.dataset?.cellkey || null;
  };

  const handleTouchStart = (mi, d, e) => {
    if(mode==="blocked") { handleCellAction(mi,d,e); return; }
    const k_ = K(mi,d);
    const add = !isMyAvail(k_);
    touchRef.current = {active:true, mode: add ? "add" : "remove"};
    markAvail(k_, add);
    setTapped(k_); setTimeout(()=>setTapped(null), 200);
  };

  const handleTouchMove = (e) => {
    if(!touchRef.current.active || mode==="blocked") return;
    e.preventDefault();
    const touch = e.touches[0];
    const k_ = getCellFromTouch(touch);
    if(k_ && k_ !== touchRef.current.lastKey) {
      touchRef.current.lastKey = k_;
      markAvail(k_, touchRef.current.mode === "add");
    }
  };

  const handleTouchEnd = () => { touchRef.current = {active:false, mode:null, lastKey:null}; };

  // Best windows
  const bestWindows = [];
  MONTHS.forEach((m,mi)=>{
    let streak=[];
    for(let d=1;d<=m.days;d++){
      if(countFree(K(mi,d))===5) streak.push(d);
      else{if(streak.length>=3)bestWindows.push({mi,days:[...streak]});streak=[];}
    }
    if(streak.length>=3) bestWindows.push({mi,days:[...streak]});
  });

  const myFree = avail[user]?.size||0;
  const myBlocked = Object.keys(blocks[user]||{}).length;
  const m = MONTHS[activeMonth];
  const weekends = getWeekends(activeMonth);

  // ─── Name picker ──────────────────────────────────────────────────────
  if(!user) return (
    <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center",maxWidth:360,padding:"0 24px",width:"100%"}}>
        <div style={{fontSize:48,marginBottom:16}}>✈️</div>
        <h1 style={{fontSize:28,fontWeight:600,marginBottom:4,letterSpacing:"-0.5px"}}>Manoirski</h1>
        <p style={{color:"var(--faint)",fontSize:15,fontStyle:"italic",marginBottom:32}}>Spring + Summer '26</p>
        <p style={{fontSize:14,color:"var(--muted)",marginBottom:20}}>Who are you?</p>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {FRIENDS.map(f=>(
            <button key={f} onClick={()=>setUser(f)} style={{
              padding:"16px",border:"1.5px solid var(--line)",borderRadius:14,background:"var(--card)",
              fontSize:17,fontFamily:"var(--mono)",cursor:"pointer",color:"var(--text)",transition:"all 0.2s",
            }}>{f}</button>
          ))}
        </div>
      </div>
    </div>
  );

  // ─── Main ─────────────────────────────────────────────────────────────
  return (
    <div style={{height:"100vh",display:"flex",flexDirection:"column",paddingBottom:"var(--bottom-bar)"}}>
      {toast && <div className="toast">{toast}</div>}
      {reasonInput && <InlineReason position={{x:reasonInput.x,y:reasonInput.y}}
        onDone={(reason)=>{
          if(reason!==null) reasonInput.keys.forEach(k_=>markBlock(k_,reason));
          setReasonInput(null);
        }} />}

      {/* Header */}
      <div style={{padding:"14px 20px 0",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <div>
            <h1 style={{fontSize:22,fontWeight:600,letterSpacing:"-0.5px",lineHeight:1}}>Manoirski</h1>
            <span style={{fontSize:12,color:"var(--faint)",fontStyle:"italic"}}>Spring + Summer '26</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span className="sync-dot" style={{background:syncStatus==="synced"?"var(--green)":syncStatus==="saving"?"#c9a84c":"var(--red)"}} />
            <button onClick={()=>{localStorage.removeItem("manoirski-user");setUser("");}}
              style={{border:"1px solid var(--line)",background:"var(--card)",borderRadius:8,
                padding:"5px 10px",fontSize:11,fontFamily:"var(--mono)",color:"var(--muted)",cursor:"pointer"}}>
              {user} ↗
            </button>
          </div>
        </div>

        {/* Month selector */}
        <div style={{display:"flex",gap:4,background:"#f2ede8",borderRadius:10,padding:3,marginBottom:12}}>
          {MONTHS.map((mo,i)=>(
            <button key={i} className={`mnav ${activeMonth===i?"mnav-on":""}`} onClick={()=>setActiveMonth(i)}>
              {mo.short}
            </button>
          ))}
        </div>
      </div>

      {/* Scrollable content */}
      <div style={{flex:1,overflowY:"auto",padding:"0 20px 20px",WebkitOverflowScrolling:"touch"}}>
        {/* Term badges */}
        <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
          {TERMS.filter(t=>{
            const ts=t.start[0]*100+t.start[1],te=t.end[0]*100+t.end[1],ms=activeMonth*100+1,me=activeMonth*100+m.days;
            return ts<=me&&te>=ms;
          }).map(t=>(
            <span key={t.label} style={{fontSize:10,fontFamily:"var(--mono)",fontWeight:600,
              padding:"4px 9px",borderRadius:6,background:t.bg,color:t.dot,border:`1px solid ${t.accent}40`}}>
              {t.label}
            </span>
          ))}
        </div>

        {/* Day headers */}
        <div style={{display:"grid",gridTemplateColumns:`repeat(7, var(--cell))`,gap:3,marginBottom:4,justifyContent:"center"}}>
          {DOW.map((d,i)=>(
            <div key={i} style={{textAlign:"center",fontSize:11,color:"var(--faint)",fontFamily:"var(--mono)",padding:"2px 0",
              fontWeight:i>=5?600:400,color:i>=5?"var(--muted)":"var(--faint)"}}>{d}</div>
          ))}
        </div>

        {/* Calendar grid */}
        <div style={{display:"grid",gridTemplateColumns:`repeat(7, var(--cell))`,gap:3,marginBottom:14,justifyContent:"center"}}
          onMouseLeave={()=>setDragging(false)}
          onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}
        >
          {Array.from({length:m.start}).map((_,i)=><div key={`e${i}`} />)}
          {Array.from({length:m.days}).map((_,i)=>{
            const d=i+1, k_=K(activeMonth,d);
            const free=countFree(k_), bl=countBlocked(k_);
            const isMine=isMyAvail(k_), isBlk=isMyBlock(k_);
            const dow=(m.start+i)%7, isWknd=dow>=5;
            const term=termFor(activeMonth,d), isHov=hovered===k_;
            const isTapped = tapped===k_;

            let bg="#fff";
            if(term) bg=term.bg;
            if(isWknd&&!term) bg="#f5f1ed";
            if(free>0) bg=HEAT[free];
            if(isBlk) bg="var(--red-soft)";

            return (
              <div key={d} className={`cell ${isTapped?"cell-tap":""}`}
                data-cellkey={k_}
                onMouseDown={e=>{
                  e.preventDefault();
                  if(e.button===2) return;
                  if(mode==="blocked") { handleCellAction(activeMonth,d,e); return; }
                  if(isBlk) { unblock(k_); markAvail(k_,true); setDragging(false); return; }
                  const add=!isMine;
                  setDragging(true); markAvail(k_,add);
                  // store drag direction
                  window.__dragAdd = add;
                }}
                onMouseEnter={()=>{setHovered(k_);if(dragging&&mode==="free"){markAvail(k_,window.__dragAdd);}}}
                onMouseLeave={()=>setHovered(null)}
                onMouseUp={()=>setDragging(false)}
                onContextMenu={e=>{
                  e.preventDefault();
                  if(isBlk){unblock(k_);}
                  else{const r=e.currentTarget.getBoundingClientRect();setReasonInput({keys:[k_],x:r.left+r.width/2,y:r.bottom});}
                }}
                onTouchStart={e=>{e.stopPropagation();handleTouchStart(activeMonth,d,e);}}
                style={{
                  background:bg,
                  borderColor: isBlk?"var(--red-border)":isMine?"var(--green)":"transparent",
                  color: free===5?"#fff":isBlk?"var(--red)":isMine?"#1a6b4a":"var(--muted)",
                  fontWeight: isMine||isBlk?700:400,
                  textDecoration: isBlk?"line-through":"none",
                  boxShadow: term&&free===0&&!isBlk?`inset 0 -2.5px 0 0 ${term.accent}30`:"none",
                }}
              >
                {d}
                {free>0&&free<5&&!isBlk&&<span style={{position:"absolute",bottom:1,right:3,fontSize:7,color:"var(--green)",fontWeight:700}}>{free}</span>}
                {free===5&&<span style={{position:"absolute",bottom:0,right:3,fontSize:7}}>✓</span>}
                {isBlk&&<span style={{position:"absolute",top:0,right:2,fontSize:7,color:"var(--red)"}}>✗</span>}
                {bl>0&&!isBlk&&<span style={{position:"absolute",top:0,left:3,fontSize:7,color:"var(--red)"}}>{bl}</span>}
                {isHov&&bl>0&&(
                  <div className="tooltip">
                    {FRIENDS.filter(f=>k_ in (blocks[f]||{})).map(f=>(
                      <div key={f}>{f}{blocks[f][k_]?` — ${blocks[f][k_]}`:""}</div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* Weekend buttons */}
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:20}}>
          {weekends.map((days,idx)=>{
            const keys=days.map(d=>K(activeMonth,d));
            const allOn=keys.every(k_=>isMyAvail(k_));
            const allBlk=keys.every(k_=>isMyBlock(k_));
            const cls = allBlk ? "wk wk-blk" : allOn ? "wk wk-on" : "wk";
            return (
              <button key={idx} className={cls} onClick={()=>toggleWknd(activeMonth,days)}>
                {allBlk?"✗ ":allOn?"✓ ":""}{m.short} {days[0]}–{days[days.length-1]}
              </button>
            );
          })}
        </div>

        {/* Perfect windows */}
        {bestWindows.length>0&&(
          <div style={{padding:"14px 16px",background:"var(--green-soft)",borderRadius:12,border:"1.5px solid rgba(34,139,104,0.15)",marginBottom:24}}>
            <p style={{fontSize:11,fontFamily:"var(--mono)",fontWeight:700,color:"var(--green)",marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>🎯 Everyone's free</p>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {bestWindows.map((w,i)=>(
                <span key={i} style={{background:"var(--green)",color:"#fff",padding:"6px 12px",borderRadius:8,fontSize:12,fontFamily:"var(--mono)",fontWeight:700}}>
                  {MONTHS[w.mi].short} {w.days[0]}–{w.days[w.days.length-1]} <span style={{opacity:0.7}}>({w.days.length}d)</span>
                </span>
              ))}
            </div>
          </div>
        )}

        {/* Destinations */}
        <div style={{marginBottom:24}}>
          <h2 style={{fontSize:18,fontWeight:600,marginBottom:4}}>Where to?</h2>
          <p style={{fontSize:11,color:"var(--faint)",fontFamily:"var(--mono)",marginBottom:14}}>tap to vote</p>
          {[{cat:"wknd",label:"Weekend trips"},{cat:"long",label:"Longer trips"}].map(({cat,label})=>(
            <div key={cat} style={{marginBottom:16}}>
              <p style={{fontSize:10,fontFamily:"var(--mono)",color:"var(--faint)",fontWeight:600,marginBottom:8,textTransform:"uppercase",letterSpacing:0.8}}>{label}</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {DESTINATIONS.filter(d=>d.cat===cat).sort((a,b)=>vc(b.name)-vc(a.name)).map(dest=>{
                  const v=vc(dest.name),voted=votes[user]?.has(dest.name);
                  const voters=FRIENDS.filter(f=>votes[f]?.has(dest.name));
                  return (
                    <div key={dest.name} className={`dest ${voted?"dest-on":""}`} onClick={()=>toggleVote(dest.name)}
                      title={voters.length>0?voters.join(", "):"No votes yet"}>
                      <span style={{fontSize:18}}>{dest.flag}</span>
                      <span style={{fontSize:13,fontWeight:voted?600:400}}>{dest.name}</span>
                      {v>0&&<span style={{fontSize:10,fontFamily:"var(--mono)",fontWeight:700,
                        background:voted?"var(--red)":"#ece6df",color:voted?"#fff":"var(--muted)",
                        padding:"2px 7px",borderRadius:100}}>{v}</span>}
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>

        {/* Legend */}
        <div style={{padding:"12px 14px",background:"#f2ede8",borderRadius:10,
          display:"flex",gap:16,flexWrap:"wrap",alignItems:"center",
          fontSize:11,fontFamily:"var(--mono)",color:"var(--muted)"}}>
          <span style={{display:"flex",alignItems:"center",gap:5}}>
            <span style={{width:14,height:14,borderRadius:5,border:"2px solid var(--green)",display:"inline-block"}} /> free
          </span>
          <span style={{display:"flex",alignItems:"center",gap:5}}>
            <span style={{width:14,height:14,borderRadius:5,background:"var(--red-soft)",border:"2px solid var(--red-border)",display:"inline-block"}} /> blocked
          </span>
          <span style={{display:"flex",alignItems:"center",gap:3}}>
            {[1,2,3,4,5].map(n=><span key={n} style={{width:12,height:12,borderRadius:4,background:HEAT[n],display:"inline-block"}} />)}
            <span style={{marginLeft:3}}>1→5</span>
          </span>
          <span>{myFree}✓ {myBlocked}✗</span>
        </div>
      </div>

      {/* Bottom bar — mode toggle */}
      <div className="bottom-bar">
        <button className="mode-pill" onClick={()=>setMode("free")}
          style={{background:mode==="free"?"var(--green)":"#f2ede8",color:mode==="free"?"#fff":"var(--muted)"}}>
          ✓ Free
        </button>
        <button className="mode-pill" onClick={()=>setMode("blocked")}
          style={{background:mode==="blocked"?"var(--red)":"#f2ede8",color:mode==="blocked"?"#fff":"var(--muted)"}}>
          ✗ Blocked
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
